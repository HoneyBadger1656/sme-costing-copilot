services:
  - type: web
    name: sme-costing-copilot
    env: docker
    plan: free
    healthCheck:
      path: /health
      timeoutSeconds: 30
      intervalSeconds: 30
      gracePeriodSeconds: 60
    envVars:
      - key: PORT
        value: 8000
      - key: DATABASE_URL
        fromDatabase:
          name: sme-copilot-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
    autoDeploy: true
    dockerfilePath: ./Dockerfile
    dockerContext: .

databases:
  - name: sme-copilot-db
    plan: free
